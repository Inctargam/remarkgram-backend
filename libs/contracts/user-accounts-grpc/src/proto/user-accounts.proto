syntax = "proto3";

package remarkgram.user_accounts.v1;

service UsersService {
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);
}

enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_GITHUB = 1;
  OAUTH_PROVIDER_GOOGLE = 2;
}

message OAuthEmail {
  string email = 1;
  bool verified = 2;
  bool primary = 3;
}

message OAuthIdentityClaims {
  OAuthProvider provider = 1;
  string subject = 2;
  string username = 3;
  string avatar_url = 4;
  repeated OAuthEmail emails = 5;
}

message AuthenticateOAuthRequest {
    OAuthIdentityClaims identity = 1;
    string ip = 2;
    string device_name = 3;
    VerifiedRefreshTokenClaims current_session = 4;
}

service AuthService {
  rpc Login(LoginRequest) returns (TokenPairResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (TokenPairResponse);
  rpc AuthenticateOAuth(AuthenticateOAuthRequest) returns (TokenPairResponse);
}

service RegistrationService {
  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc ConfirmRegistration(ConfirmRegistrationRequest) returns (ConfirmRegistrationResponse);
  rpc ResendRegistrationConfirmation(ResendRegistrationConfirmationRequest) returns (ResendRegistrationConfirmationResponse);
}

service SessionsService {
  rpc GetSessions(GetSessionsRequest) returns (GetSessionsResponse);
  rpc LogoutCurrentSession(LogoutCurrentSessionRequest) returns (LogoutCurrentSessionResponse);
  rpc RevokeSession(RevokeSessionRequest) returns (RevokeSessionResponse);
  rpc RevokeOtherSessions(RevokeOtherSessionsRequest) returns (RevokeOtherSessionsResponse);
}

service TestingService {
  rpc DeleteAllData(DeleteAllDataRequest) returns (DeleteAllDataResponse);
}

message GetUsersRequest {}

message User {
  int32 id = 1;
  string username = 2;
  string email = 3;
}

message GetUsersResponse {
  repeated User users = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string ip = 3;
  string device_name = 4;
  VerifiedRefreshTokenClaims current_session = 5;
}

message RefreshTokenRequest {
  VerifiedRefreshTokenClaims auth = 1;
  string ip = 2;
  string device_name = 3;
}

message VerifiedRefreshTokenClaims {
  string user_id = 1;
  string session_id = 2;
  string jti = 3;
}

message TokenPairResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RegisterUserRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

message RegisterUserResponse {}

message ConfirmRegistrationRequest {
  string code = 1;
}

message ConfirmRegistrationResponse {}

message ResendRegistrationConfirmationRequest {
  string email = 1;
}

message ResendRegistrationConfirmationResponse {}

message GetSessionsRequest {
  VerifiedRefreshTokenClaims auth = 1;
}

message Session {
  string ip = 1;
  string device_name = 2;
  string last_active_at = 3;
  string session_id = 4;
  bool is_current = 5;
}

message GetSessionsResponse {
  repeated Session sessions = 1;
}

message LogoutCurrentSessionRequest {
  VerifiedRefreshTokenClaims auth = 1;
}

message LogoutCurrentSessionResponse {}

message RevokeSessionRequest {
  VerifiedRefreshTokenClaims auth = 1;
  string session_id = 2;
}

message RevokeSessionResponse {}

message RevokeOtherSessionsRequest {
  VerifiedRefreshTokenClaims auth = 1;
}

message RevokeOtherSessionsResponse {}

message DeleteAllDataRequest {}

message DeleteAllDataResponse {}


service PasswordResetService {
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ConfirmPasswordReset(ConfirmPasswordResetRequest) returns (ConfirmPasswordResetResponse);
}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {
  bool accepted = 1;
}

message ConfirmPasswordResetRequest {
  string token = 1;
  string new_password = 2;
}

message ConfirmPasswordResetResponse {}
